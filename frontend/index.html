<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Exam Plan Tracker</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
    }
    .tabs {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 1px solid #e5e7eb;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
      color: #6b7280;
    }
    .tab.active {
      color: #4f46e5;
      border-bottom: 2px solid #4f46e5;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card login-card">
      <h1 style="text-align: center; margin-bottom: 24px;">📚 Exam Plan Tracker</h1>
      
      <div class="tabs">
        <div id="tab-login" class="tab active">Login</div>
        <div id="tab-register" class="tab">Register</div>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="hidden">
        <div class="form-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" required>
        </div>
        <div class="form-group">
          <label for="register-password">Password (min 8 characters)</label>
          <input type="password" id="register-password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>

      <div id="message" class="error hidden"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
