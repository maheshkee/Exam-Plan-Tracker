<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Tasks - Exam Plan Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .action-btns {
      display: flex;
      gap: 8px;
    }
    .status-badge {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .status-COMPLETED { background: #dcfce7; color: #16a34a; }
    .status-SKIPPED { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="brand">📚 Exam Plan Tracker</div>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="tasks.html">Tasks</a>
      <a href="history.html">History</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Daily Tasks</h1>

    <!-- Date Selector -->
    <div class="card" style="display: flex; gap: 12px; align-items: flex-end;">
      <div style="flex: 1;">
        <label for="task-date">View Tasks For:</label>
        <input type="date" id="task-date" style="margin-bottom: 0;">
      </div>
      <button id="load-btn" class="btn btn-secondary">Load</button>
    </div>

    <div id="error-msg" class="error hidden" style="margin-bottom: 16px;"></div>

    <!-- Add Task Card -->
    <div class="card">
      <h3>Add Task</h3>
      <form id="add-task-form" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: flex-end;">
        <div>
          <label for="subject-select">Subject</label>
          <select id="subject-select" required>
            <option value="">Select subject...</option>
          </select>
        </div>
        <div>
          <label for="topic-select">Topic</label>
          <select id="topic-select" required>
            <option value="">Select topic...</option>
          </select>
        </div>
        <div>
          <label for="planned-hours">Planned Hrs</label>
          <input type="number" id="planned-hours" step="0.5" min="0.5" max="16" value="1" required style="width: 100px; margin-bottom: 0;">
        </div>
        <div style="grid-column: span 3;">
          <button type="submit" class="btn btn-success" style="width: 100%;">+ Add Task</button>
        </div>
      </form>
    </div>

    <!-- Task List Card -->
    <div class="card">
      <h3>Task List</h3>
      <div id="no-tasks" class="hidden" style="text-align: center; padding: 20px; color: #6b7280;">
        No tasks for this date. Add one above.
      </div>
      <div id="task-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Subject</th>
              <th>Topic</th>
              <th>Planned Hrs</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="task-list-body">
            <!-- Populated via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/tasks.js"></script>
</body>
</html>
