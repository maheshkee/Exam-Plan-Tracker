services:
  - type: web
    name: exam-plan-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: exam-plan-tracker-db
          property: connectionString

databases:
  - name: exam-plan-tracker-db
    databaseName: exam_tracker
    user: exam_tracker_user
